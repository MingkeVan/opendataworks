version: '3.8'

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    pull_policy: always
    container_name: opendataworks-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-opendataworks}
      MYSQL_USER: ${MYSQL_USER:-opendataworks}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-opendataworks123}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "3316:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      # 可选：在 ../database/mysql 中放置初始化 SQL
      - ../database/mysql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 5
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password

  # 后端服务
  backend:
    image: mikefan2019/opendataworks-backend:latest
    pull_policy: always
    container_name: opendataworks-backend
    restart: always
    env_file:
      - ./.env
    # DolphinScheduler 不包含在本 Compose 中，配置请在系统管理界面进行
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    volumes:
      - backend-logs:/app/logs

  dataagent-backend:
    build:
      context: ../dataagent-backend
    container_name: dataagent-backend
    restart: always
    env_file:
      - ./.env
    environment:
      AQS_DB_URL: jdbc:mysql://mysql:3306/opendataworks?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      AQS_DB_USERNAME: ${MYSQL_USER:-opendataworks}
      AQS_DB_PASSWORD: ${MYSQL_PASSWORD:-opendataworks123}
      AQS_CORE_BACKEND_BASE_URL: http://backend:8080/api
      AQS_LLM_BASE_URL: ${AQS_LLM_BASE_URL:-https://api.openai.com}
      AQS_LLM_MODEL: ${AQS_LLM_MODEL:-gpt-4o-mini}
      AQS_LLM_API_KEY: ${AQS_LLM_API_KEY:-}
    ports:
      - "8090:8090"
    depends_on:
      mysql:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/api/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # 前端服务
  frontend:
    image: mikefan2019/opendataworks-frontend:latest
    pull_policy: always
    container_name: opendataworks-frontend
    restart: always
    env_file:
      - ./.env
    ports:
      - "8081:80"
    depends_on:
      - backend
      - dataagent-backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  mysql-data:
    driver: local
  backend-logs:
    driver: local
