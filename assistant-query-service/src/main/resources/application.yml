server:
  port: 8090
  servlet:
    context-path: /api

spring:
  application:
    name: odw-assistant-query-service
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${AQS_DB_URL:jdbc:mysql://localhost:3306/opendataworks_assistant?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${AQS_DB_USERNAME:opendataworks}
    password: ${AQS_DB_PASSWORD:opendataworks123}
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    serialization:
      write-dates-as-timestamps: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration
    table: assistant_query_flyway_schema_history

mybatis-plus:
  type-aliases-package: com.onedata.portal.entity
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

management:
  endpoints:
    web:
      exposure:
        include: health,info

assistant:
  core-backend:
    base-url: ${AQS_CORE_BACKEND_BASE_URL:http://localhost:8080/api}
    connect-timeout-ms: 5000
    read-timeout-ms: 300000
  llm:
    chat:
      enabled: ${AQS_LLM_ENABLED:true}
      base-url: ${AQS_LLM_BASE_URL:https://api.openai.com}
      model: ${AQS_LLM_MODEL:gpt-4o-mini}
      api-key-env: ${AQS_LLM_API_KEY_ENV:AQS_LLM_API_KEY}
      strict: ${AQS_LLM_STRICT:true}
      temperature: ${AQS_LLM_TEMPERATURE:0.1}
      max-tokens: ${AQS_LLM_MAX_TOKENS:1200}
      timeout-ms: ${AQS_LLM_TIMEOUT_MS:30000}
  policy:
    default-mode: need-confirm
  startup:
    fail-fast: true
  limit:
    text-answer: 500
    bi-sampling: 2000
    max: 10000

auth:
  anonymous:
    enabled: true
    user-id: 1
    username: admin

logging:
  level:
    com.onedata.portal: INFO
